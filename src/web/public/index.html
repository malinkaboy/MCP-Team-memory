<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Memory - Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css?v=4">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Graph visualization: force-graph (2D canvas, d3-force) -->
  <script src="https://unpkg.com/force-graph@1.43.5/dist/force-graph.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <i data-lucide="brain" class="logo-icon"></i>
        <span class="logo-text">Team Memory</span>
      </div>

      <!-- Project Selector -->
      <div class="project-selector">
        <label class="project-label">Проект</label>
        <div class="project-dropdown-wrap">
          <div class="custom-select" id="project-select">
            <button class="custom-select-trigger" type="button">
              <span class="custom-select-value">Загрузка...</span>
              <i data-lucide="chevron-down" class="custom-select-arrow"></i>
            </button>
            <div class="custom-select-options" id="project-options"></div>
          </div>
          <button class="btn-icon" id="btn-manage-projects" title="Управление проектами">
            <i data-lucide="settings"></i>
          </button>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-category="all">
          <i data-lucide="layout-grid" class="nav-icon"></i>
          <span>Все записи</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-category="pinned">
          <i data-lucide="pin" class="nav-icon"></i>
          <span>Закреплённые</span>
          <span class="nav-count" id="count-pinned">0</span>
        </button>
        <button class="nav-item" data-category="architecture">
          <i data-lucide="building-2" class="nav-icon"></i>
          <span>Архитектура</span>
          <span class="nav-count" id="count-architecture">0</span>
        </button>
        <button class="nav-item" data-category="tasks">
          <i data-lucide="clipboard-list" class="nav-icon"></i>
          <span>Задачи</span>
          <span class="nav-count" id="count-tasks">0</span>
        </button>
        <button class="nav-item" data-category="decisions">
          <i data-lucide="check-circle-2" class="nav-icon"></i>
          <span>Решения</span>
          <span class="nav-count" id="count-decisions">0</span>
        </button>
        <button class="nav-item" data-category="issues">
          <i data-lucide="bug" class="nav-icon"></i>
          <span>Проблемы</span>
          <span class="nav-count" id="count-issues">0</span>
        </button>
        <button class="nav-item" data-category="progress">
          <i data-lucide="trending-up" class="nav-icon"></i>
          <span>Прогресс</span>
          <span class="nav-count" id="count-progress">0</span>
        </button>

        <div class="nav-divider"></div>
        <button class="nav-item nav-item-graph" id="btn-graph-view">
          <i data-lucide="network" class="nav-icon"></i>
          <span>Граф знаний</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="agents-status">
          <span class="status-dot"></span>
          <span id="agents-count">0 агентов онлайн</span>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Свернуть меню">
          <i data-lucide="panel-left-close" class="sidebar-toggle-icon"></i>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <h1 id="page-title">Все записи</h1>
          <div class="stats">
            <span class="stat">
              <span class="stat-value" id="stat-total">0</span>
              <span class="stat-label">всего</span>
            </span>
            <span class="stat">
              <span class="stat-value" id="stat-24h">0</span>
              <span class="stat-label">за 24ч</span>
            </span>
            <span class="stat-divider"></span>
            <span class="embedding-indicator" id="embedding-indicator" title="">
              <span class="embedding-dot" id="embedding-dot"></span>
              <span class="stat-value" id="embedding-count">—</span>
              <span class="stat-label">vectorized</span>
            </span>
          </div>
          <!-- Embedding dropdown panel -->
          <div class="embedding-panel" id="embedding-panel">
            <div class="embedding-panel-header">Vector Search</div>
            <div class="embedding-panel-models" id="embedding-models"></div>
            <div class="embedding-panel-progress" id="embedding-progress"></div>
            <div class="embedding-panel-footer">Настройка через .mcp.json</div>
          </div>
        </div>
        <div class="header-right">
          <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="search-input" placeholder="Поиск...">
          </div>
          <div class="custom-select custom-select--compact" id="status-select">
            <button class="custom-select-trigger" type="button">
              <span class="custom-select-value">Все статусы</span>
              <i data-lucide="chevron-down" class="custom-select-arrow"></i>
            </button>
            <div class="custom-select-options" id="status-options">
              <div class="custom-select-option selected" data-value="">
                <span class="custom-select-option-name">Все статусы</span>
              </div>
              <div class="custom-select-option" data-value="active">
                <span class="custom-select-option-name">Активные</span>
              </div>
              <div class="custom-select-option" data-value="completed">
                <span class="custom-select-option-name">Завершённые</span>
              </div>
              <div class="custom-select-option" data-value="archived">
                <span class="custom-select-option-name">Архив</span>
              </div>
            </div>
          </div>
          <button class="btn btn-secondary" id="btn-export" title="Экспорт">
            <i data-lucide="download"></i>
            Экспорт
          </button>
          <button class="btn btn-primary" id="btn-add">
            <i data-lucide="plus"></i>
            Добавить
          </button>
        </div>
      </header>

      <!-- Domain Filter Pills -->
      <div class="domain-filters" id="domain-filters">
        <button class="domain-pill active" data-domain="">Все домены</button>
      </div>

      <!-- Entries Grid -->
      <div class="entries-container" id="entries-container">
        <div class="loading">
          <i data-lucide="loader-2" class="spin"></i>
          <span>Загрузка...</span>
        </div>
      </div>

      <!-- Graph View (hidden by default) -->
      <div class="graph-view" id="graph-view" style="display:none">
        <div class="graph-toolbar">
          <div class="graph-toolbar-left">
            <button class="btn btn-secondary btn-sm" id="btn-toggle-layout" onclick="toggleLayout()">
              <i data-lucide="rotate-cw"></i> Reheat
            </button>
            <button class="btn btn-secondary btn-sm" onclick="graphZoomIn()">
              <i data-lucide="zoom-in"></i>
            </button>
            <button class="btn btn-secondary btn-sm" onclick="graphZoomOut()">
              <i data-lucide="zoom-out"></i>
            </button>
            <button class="btn btn-secondary btn-sm" onclick="graphZoomFit()">
              <i data-lucide="maximize-2"></i>
            </button>
            <button class="btn btn-secondary btn-sm" onclick="resetGraphFilters()">
              <i data-lucide="refresh-cw"></i> Сброс
            </button>
          </div>
          <div class="graph-toolbar-right">
            <div class="graph-stats" id="graph-stats"></div>
            <button class="btn btn-secondary btn-sm" id="btn-toggle-sidebar" onclick="toggleGraphSidebar()" title="Легенда">
              <i data-lucide="panel-right-close"></i>
            </button>
          </div>
        </div>
        <div class="graph-body">
          <div class="graph-canvas-wrap">
            <div id="graph-container"></div>
            <div id="graph-tooltip"></div>
          </div>
          <div class="graph-sidebar">
            <div class="graph-legend" id="graph-legend"></div>
            <div class="graph-detail-panel" id="graph-detail-panel"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Add/Edit Entry Modal -->
    <div class="modal" id="entry-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Добавить запись</h2>
          <button class="modal-close" id="modal-close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <form id="entry-form">
          <input type="hidden" id="entry-id">

          <div class="form-row">
            <div class="form-group">
              <label for="entry-category">Категория</label>
              <select id="entry-category" required>
                <option value="architecture">Архитектура</option>
                <option value="tasks">Задачи</option>
                <option value="decisions">Решения</option>
                <option value="issues">Проблемы</option>
                <option value="progress">Прогресс</option>
              </select>
            </div>
            <div class="form-group">
              <label for="entry-domain">Домен</label>
              <select id="entry-domain">
                <option value="">Без домена</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="entry-title">Заголовок</label>
            <input type="text" id="entry-title" required placeholder="Краткое описание">
          </div>

          <div class="form-group">
            <label for="entry-content">Содержимое</label>
            <textarea id="entry-content" required rows="10" placeholder="Подробное описание..."></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="entry-priority">Приоритет</label>
              <select id="entry-priority">
                <option value="low">Низкий</option>
                <option value="medium" selected>Средний</option>
                <option value="high">Высокий</option>
                <option value="critical">Критический</option>
              </select>
            </div>
            <div class="form-group">
              <label for="entry-status">Статус</label>
              <select id="entry-status">
                <option value="active">Активный</option>
                <option value="completed">Завершён</option>
                <option value="archived">Архив</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="entry-tags">Теги (через запятую)</label>
            <input type="text" id="entry-tags" placeholder="frontend, api, bug">
          </div>

          <div class="form-group">
            <label for="entry-author">Автор</label>
            <input type="text" id="entry-author" placeholder="Имя или агент">
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="btn-cancel">Отмена</button>
            <button type="submit" class="btn btn-primary">Сохранить</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Project Management Modal -->
    <div class="modal" id="projects-modal">
      <div class="modal-content modal-wide">
        <div class="modal-header">
          <h2>Управление проектами</h2>
          <button class="modal-close" id="projects-modal-close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="projects-body">
          <!-- New Project Form -->
          <div class="project-form">
            <h3>Новый проект</h3>
            <div class="form-row">
              <div class="form-group" style="flex:2">
                <input type="text" id="new-project-name" placeholder="Название проекта">
              </div>
              <div class="form-group" style="flex:3">
                <input type="text" id="new-project-description" placeholder="Описание (необязательно)">
              </div>
              <div class="form-group" style="flex:0 0 auto">
                <button class="btn btn-primary" id="btn-create-project">
                  <i data-lucide="plus"></i> Создать
                </button>
              </div>
            </div>
          </div>

          <!-- Projects List -->
          <div class="projects-list" id="projects-list">
            <div class="loading">Загрузка...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <script src="app.js?v=4"></script>
  <script src="graph.js?v=6"></script>
</body>
</html>
