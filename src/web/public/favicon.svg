<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="48" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>
  <!-- Brain group -->
  <g transform="translate(0, -4)">
    <!-- Left hemisphere - organic brain shape with folds -->
    <path d="M62 34 C52 34, 42 38, 38 46 C34 54, 34 58, 36 64 C32 62, 28 66, 30 72 C32 78, 38 80, 42 78 C42 82, 46 86, 52 86 C56 86, 60 84, 62 80"
          fill="none" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Right hemisphere -->
    <path d="M66 34 C76 34, 86 38, 90 46 C94 54, 94 58, 92 64 C96 62, 100 66, 98 72 C96 78, 90 80, 86 78 C86 82, 82 86, 76 86 C72 86, 68 84, 66 80"
          fill="none" stroke="url(#glow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Central fissure -->
    <path d="M64 34 L64 80" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.35"/>
    <!-- Brain folds - left -->
    <path d="M44 48 C50 52, 56 48, 62 50" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M38 62 C46 58, 52 62, 62 60" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M44 74 C50 70, 56 74, 62 72" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
    <!-- Brain folds - right -->
    <path d="M66 50 C72 48, 78 52, 84 48" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
    <path d="M66 60 C76 62, 82 58, 90 62" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
    <path d="M66 72 C72 74, 78 70, 84 74" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
    <!-- Neural activation nodes -->
    <circle cx="48" cy="46" r="2.5" fill="#7c3aed" opacity="0.85"/>
    <circle cx="80" cy="46" r="2.5" fill="#7c3aed" opacity="0.85"/>
    <circle cx="42" cy="62" r="2" fill="#a78bfa" opacity="0.7"/>
    <circle cx="86" cy="62" r="2" fill="#a78bfa" opacity="0.7"/>
    <circle cx="50" cy="74" r="2" fill="#c084fc" opacity="0.6"/>
    <circle cx="78" cy="74" r="2" fill="#c084fc" opacity="0.6"/>
    <circle cx="64" cy="56" r="3" fill="#a78bfa" opacity="0.8"/>
    <!-- Synapse sparks -->
    <line x1="48" y1="46" x2="64" y2="56" stroke="#a78bfa" stroke-width="1" opacity="0.35"/>
    <line x1="80" y1="46" x2="64" y2="56" stroke="#a78bfa" stroke-width="1" opacity="0.35"/>
    <line x1="42" y1="62" x2="64" y2="56" stroke="#a78bfa" stroke-width="1" opacity="0.25"/>
    <line x1="86" y1="62" x2="64" y2="56" stroke="#a78bfa" stroke-width="1" opacity="0.25"/>
    <line x1="50" y1="74" x2="64" y2="56" stroke="#c084fc" stroke-width="1" opacity="0.2"/>
    <line x1="78" y1="74" x2="64" y2="56" stroke="#c084fc" stroke-width="1" opacity="0.2"/>
  </g>
  <!-- "TM" text -->
  <text x="64" y="102" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" opacity="0.6" letter-spacing="2">TM</text>
</svg>
