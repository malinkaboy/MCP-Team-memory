services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: team_memory
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory} -d team_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD:-memory}@postgres:5432/team_memory
      MEMORY_TRANSPORT: http
      MEMORY_PORT: "3846"
      MEMORY_API_TOKEN: ${MEMORY_API_TOKEN:-}
      MEMORY_CORS_ORIGIN: ${MEMORY_CORS_ORIGIN:-*}
    ports:
      - "3846:3846"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3846/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
