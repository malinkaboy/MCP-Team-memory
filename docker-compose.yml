services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: team_memory
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory} -d team_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD:-memory}@postgres:5432/team_memory
      MEMORY_TRANSPORT: http
      MEMORY_PORT: "3846"
      MEMORY_API_TOKEN: ${MEMORY_API_TOKEN:-}
      MEMORY_CORS_ORIGIN: ${MEMORY_CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MEMORY_AUTO_ARCHIVE: ${MEMORY_AUTO_ARCHIVE:-true}
      MEMORY_AUTO_ARCHIVE_DAYS: ${MEMORY_AUTO_ARCHIVE_DAYS:-14}
      MEMORY_DECAY_THRESHOLD: ${MEMORY_DECAY_THRESHOLD:-}
      MEMORY_DECAY_DAYS: ${MEMORY_DECAY_DAYS:-30}
      MEMORY_DECAY_WEIGHTS: ${MEMORY_DECAY_WEIGHTS:-0.3,0.2,0.3,0.2}
      MEMORY_EMBEDDING_PROVIDER: ${MEMORY_EMBEDDING_PROVIDER:-}
      MEMORY_EMBEDDING_MODEL_DIR: ${MEMORY_EMBEDDING_MODEL_DIR:-data/models}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      PG_CONTAINER: ${COMPOSE_PROJECT_NAME:-team-memory-mcp}-postgres-1
    ports:
      - "3846:3846"
    volumes:
      - backups:/app/data/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3846/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
  backups:
  qdrant_data:
